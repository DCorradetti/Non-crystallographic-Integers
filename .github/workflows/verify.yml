name: verify-certificates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run verification
        run: |
          python --version
          python verify.py --clean

      - name: Upload certificate tree
        uses: actions/upload-artifact@v4
        with:
          name: certificates-${{ github.sha }}
          path: certificates/
          retention-days: 90
